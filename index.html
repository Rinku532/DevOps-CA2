<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Student Feedback Registration Form — Submit your course feedback securely and easily." />
  <title>Student Feedback Registration Form</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- ========================
       INTERNAL CSS
       (base layout & typography)
       ======================== -->
  <style>
    /* ---------- Reset & Base ---------- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.9rem;
      font-weight: 700;
      text-align: center;
      letter-spacing: -0.02em;
      margin-bottom: 0.35rem;
    }

    .subtitle {
      text-align: center;
      font-size: 0.88rem;
      font-weight: 400;
      margin-bottom: 2rem;
      opacity: 0.7;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.45rem;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    select,
    textarea {
      width: 100%;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
    }

    .required-star { color: #f87171; margin-left: 2px; }
  </style>
</head>
<body>

  <!-- ===== MAIN FORM CARD ===== -->
  <div class="card" role="main">
    <div class="card-header">
      <div class="logo-ring">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
          <path d="M6 12v5c3 3 9 3 12 0v-5"/>
        </svg>
      </div>
      <h1>Student Feedback Form</h1>
      <p class="subtitle">Share your experience &amp; help us improve</p>
    </div>

    <form id="feedbackForm" novalidate autocomplete="off">

      <!-- ── Row 1: Name + Email ── -->
      <div class="form-row two-col">

        <!-- Student Name -->
        <div class="form-group" id="group-name">
          <label for="studentName">Student Name <span class="required-star">*</span></label>
          <input
            type="text"
            id="studentName"
            name="studentName"
            placeholder="e.g. Rahul Sharma"
            aria-required="true"
            aria-describedby="err-name"
          />
          <span class="error-msg" id="err-name" role="alert"></span>
        </div>

        <!-- Email ID -->
        <div class="form-group" id="group-email">
          <label for="emailId">Email ID <span class="required-star">*</span></label>
          <input
            type="email"
            id="emailId"
            name="emailId"
            placeholder="e.g. rahul@college.edu"
            aria-required="true"
            aria-describedby="err-email"
          />
          <span class="error-msg" id="err-email" role="alert"></span>
        </div>

      </div>

      <!-- ── Row 2: Mobile + Department ── -->
      <div class="form-row two-col">

        <!-- Mobile Number -->
        <div class="form-group" id="group-mobile">
          <label for="mobileNumber">Mobile Number <span class="required-star">*</span></label>
          <input
            type="tel"
            id="mobileNumber"
            name="mobileNumber"
            placeholder="10-digit number"
            maxlength="10"
            aria-required="true"
            aria-describedby="err-mobile"
          />
          <span class="error-msg" id="err-mobile" role="alert"></span>
        </div>

        <!-- Department -->
        <div class="form-group" id="group-dept">
          <label for="department">Department <span class="required-star">*</span></label>
          <select id="department" name="department" aria-required="true" aria-describedby="err-dept">
            <option value="">-- Select Department --</option>
            <option value="CSE">Computer Science &amp; Engineering</option>
            <option value="IT">Information Technology</option>
            <option value="ECE">Electronics &amp; Communication</option>
            <option value="ME">Mechanical Engineering</option>
            <option value="CE">Civil Engineering</option>
            <option value="EE">Electrical Engineering</option>
            <option value="AIDS">AI &amp; Data Science</option>
          </select>
          <span class="error-msg" id="err-dept" role="alert"></span>
        </div>

      </div>

      <!-- ── Gender ── -->
      <div class="form-group" id="group-gender">
        <label>Gender <span class="required-star">*</span></label>
        <div class="radio-group" role="radiogroup" aria-label="Gender selection" aria-describedby="err-gender">
          <label class="radio-label" for="genderMale">
            <input type="radio" id="genderMale" name="gender" value="Male" />
            <span class="radio-custom"></span>
            Male
          </label>
          <label class="radio-label" for="genderFemale">
            <input type="radio" id="genderFemale" name="gender" value="Female" />
            <span class="radio-custom"></span>
            Female
          </label>
          <label class="radio-label" for="genderOther">
            <input type="radio" id="genderOther" name="gender" value="Other" />
            <span class="radio-custom"></span>
            Other
          </label>
        </div>
        <span class="error-msg" id="err-gender" role="alert"></span>
      </div>

      <!-- ── Feedback Comments ── -->
      <div class="form-group" id="group-comments">
        <label for="feedbackComments">Feedback Comments <span class="required-star">*</span></label>
        <textarea
          id="feedbackComments"
          name="feedbackComments"
          rows="5"
          placeholder="Please write at least 10 words sharing your experience..."
          aria-required="true"
          aria-describedby="err-comments word-count"
        ></textarea>
        <div class="textarea-meta">
          <span class="error-msg" id="err-comments" role="alert"></span>
          <span class="word-count" id="word-count">0 words</span>
        </div>
      </div>

      <!-- ── Buttons ── -->
      <div class="btn-row">
        <button type="reset" id="resetBtn" class="btn btn-reset">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Reset
        </button>
        <button type="submit" id="submitBtn" class="btn btn-submit">
          Submit Feedback
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>

    </form>
  </div>

  <!-- ===== SUCCESS MODAL ===== -->
  <div class="modal-overlay" id="successModal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal-box">
      <div class="modal-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2 id="modal-title">Feedback Submitted!</h2>
      <p>Thank you for your valuable feedback. We'll use it to improve your learning experience.</p>
      <button id="modalClose" class="btn btn-submit" onclick="closeModal()">Close</button>
    </div>
  </div>

  <!-- JavaScript -->
  <script src="validation.js"></script>
</body>
</html>
